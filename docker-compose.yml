services:
  app:
    build: .
    image: myproject:local
    container_name: myproject_app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - PYTHONPATH=/app/src
      - CORPUS_PATH=data/corpus.jsonl
      - LOG_LEVEL=INFO
      - APP_PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped