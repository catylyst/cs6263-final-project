# grading/traceability.yaml
#
# Maps every user story to its spec section, its source modules, and its tests.
# The grading script reads this file directly. Every story ID in
# docs/STORIES.md must appear here exactly once.

stories:
  - id: US-01
    title: Answer a straigthtforward question with no retrieval
    spec_sections:
      - "4. Public Inrefaces"
      - "8.1 No Retrieval Strategy"
      - "13. User Stories Cover by This Specification"
    modules: 
    - "src/myproject/classifier.py"
    - "src/myproject/router.py"  
    - "src/myproject/strategies.py"
    - "src/myproject/schemas.py"
    tests:
    - "tests/user_stories/test_us_01_no_retrieval.py"

  - id: US-02
